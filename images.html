<!DOCTYPE html>
<html>
<head>
    <title>Click Gallery</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #FFF; /* Changed to black to see image boundaries */
            margin: 0;
            height: 100vh;
            cursor: pointer;
            overflow: hidden;
            font-family: sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            position: absolute;
            /* Zoomed out further for testing: 40% of screen width */
            max-width: 40%; 
            max-height: 70vh;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            pointer-events: none;
            border: 2px solid #333; /* Visual aid to see the image box */
        }

        img.active {
            opacity: 1;
        }

        /* Help text in case the images are missing */
        .debug-text {
            color: #444;
            position: absolute;
            bottom: 20px;
            pointer-events: none;
        }
    </style>
</head>
<body onclick="showNextImage()">

    <div class="debug-text">Click anywhere to cycle images</div>

    <div class="container">
        <img src="image1.png" class="active">
        <img src="image2.png">
        <img src="image3.png">
        <img src="image5.png">
        <img src="image6.png">
        <img src="image7.png">
        <img src="image8.png">
        <img src="image9.png">
    </div>

    <script>
        let currentIndex = 0;
        const images = document.querySelectorAll('img');

        function showNextImage() {
            if (images.length === 0) return;

            // Hide current
            images[currentIndex].classList.remove('active');
            
            // Move to next
            currentIndex = (currentIndex + 1) % images.length;
            
            // Show next
            images[currentIndex].classList.add('active');
            
            console.log("Switched to image index: " + currentIndex);
        }
    </script>
</body>
</html>
